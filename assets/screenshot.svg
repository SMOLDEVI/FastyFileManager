<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <style>
    text { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }
    .title { fill: #EADBB8; font-weight: bold; }
    .dim { fill: #6a6a6a; }
    .dir { fill: #E0C097; }
    .file { fill: #C8B6A6; }
    .sel { fill: #282828; }
    .accent { fill: #D2B48C; }
    .red { fill: #ff6b6b; }
    .yellow { fill: #ffd93d; }
    .blue { fill: #6bcbff; }
    .green { fill: #6bcb6b; }
    .cyan { fill: #6bffff; }
    .magenta { fill: #ff6bff; }
    .border { stroke: #555; stroke-width: 1; }
    .border-active { stroke: #D2B48C; stroke-width: 1.5; }
  </style>

  <!-- Terminal window frame -->
  <rect x="0" y="0" width="960" height="600" rx="6" fill="#1a1a1a"/>
  <rect x="0" y="0" width="960" height="32" rx="6" fill="#2d2d2d"/>
  <rect x="0" y="26" width="960" height="6" fill="#2d2d2d"/>
  <circle cx="18" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="58" cy="16" r="6" fill="#28c840"/>
  <text x="460" y="21" font-size="12" fill="#aaa" text-anchor="middle">ffm — FastyFileManager</text>

  <!-- Content area -->
  <g transform="translate(10, 40)">

    <!-- Left panel - Favorites -->
    <rect x="0" y="0" width="185" height="270" rx="4" fill="none" class="border-active"/>
    <text x="10" y="18" class="accent" font-size="11"> ★ Favorites</text>
    <rect x="2" y="24" width="181" height="22" rx="3" fill="#6450a0" opacity="0.4"/>
    <text x="12" y="39" class="title" font-size="12">★ 󰉒 Downloads</text>
    <text x="12" y="57" class="file" font-size="12">  󰉒 Projects</text>
    <text x="12" y="75" class="file" font-size="12">  󰉒 Documents</text>
    <text x="12" y="93" class="file" font-size="12">  󰈔 config.toml</text>

    <!-- Left panel - Drives -->
    <rect x="0" y="140" width="185" height="130" rx="4" fill="none" class="border"/>
    <text x="10" y="158" class="title" font-size="11"> Drives</text>
    <rect x="2" y="164" width="181" height="22" rx="3" fill="#D2B48C" opacity="0.3"/>
    <text x="12" y="179" class="title" font-size="12">󰉉 C:\  256.3 GB free</text>
    <text x="12" y="197" class="file" font-size="12">󰉉 D:\  512.0 GB free</text>

    <!-- Center panel - Files -->
    <rect x="195" y="0" width="365" height="530" rx="4" fill="none" class="border-active"/>
    <text x="205" y="18" class="title" font-size="11"> ~/Projects/ffm/src</text>
    <rect x="197" y="24" width="361" height="22" rx="3" fill="#D2B48C" opacity="0.25"/>
    <text x="207" y="39" class="dir" font-size="12">>   ..</text>
    <text x="207" y="57" class="dir" font-size="12">    assets</text>
    <text x="207" y="75" class="dir" font-size="12">    bin</text>
    <text x="207" y="93" class="dir" font-size="12">    target</text>
    <text x="207" y="111" class="dir" font-size="12">    tests</text>
    <text x="207" y="129" class="red" font-size="12">    app.rs</text>
    <text x="207" y="147" class="yellow" font-size="12">    config.rs</text>
    <text x="207" y="165" class="blue" font-size="12">    icons.rs</text>
    <text x="207" y="183" class="file" font-size="12">    main.rs</text>
    <text x="207" y="201" class="file" font-size="12">    theme.rs</text>
    <text x="207" y="219" class="file" font-size="12">    ui.rs</text>

    <!-- Right panel - Preview -->
    <rect x="570" y="0" width="370" height="530" rx="4" fill="none" class="border"/>
    <text x="580" y="18" class="title" font-size="11"> Preview</text>
    <text x="580" y="50" class="title" font-size="12">use crate::config::Config;</text>
    <text x="580" y="70" class="title" font-size="12">use crossterm::event::{self, Event,</text>
    <text x="580" y="86" class="title" font-size="12">    KeyCode, KeyEvent, KeyEventKind,</text>
    <text x="580" y="102" class="title" font-size="12">    KeyModifiers};</text>
    <text x="580" y="122" class="title" font-size="12">use ratatui::widgets::ListState;</text>
    <text x="580" y="142" class="dim" font-size="12">use std::collections::HashSet;</text>
    <text x="580" y="162" class="dim" font-size="12">use std::env;</text>
    <text x="580" y="182" class="dim" font-size="12">use std::fs;</text>
    <text x="580" y="202" class="dim" font-size="12">use std::io::{self, Read};</text>
    <text x="580" y="222" class="dim" font-size="12">use std::path::PathBuf;</text>

    <!-- Status bar -->
    <rect x="0" y="542" width="940" height="28" fill="none" class="border"/>
    <text x="10" y="558" class="accent" font-size="11" font-weight="bold"> FILES [Name] │ hjkl Nav │ Space Sel │ s Sort │ a New │ r Ren │ D Del │ e Edit │ y Copy │ x Cut │ p Paste │ / Search │ ? Help</text>
  </g>
</svg>
